<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full Archive — Geographies of Trash</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --black: #080808; --white: #ffffff; --gray1: #111111; --gray2: #242424;
  --gray3: #3a3a3a; --gray4: #8f8f8f; --gray5: #b2b2b2; --gray6: #d2d2d2;
  --gold: #e0b23a; --coral: #ff6b5e;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--black); color: var(--white); font-family: 'Share Tech Mono', monospace; font-size: 14px; line-height: 1.6; overflow-x: hidden; }

#site-header { position: sticky; top: 0; z-index: 100; background: var(--black); border-bottom: 1px solid var(--gray3); }
.header-inner { display: flex; align-items: center; justify-content: space-between; padding: 16px 32px; gap: 16px; max-width: 1200px; margin: 0 auto; }
.logo-mark { width: 40px; height: 40px; border: 2px solid var(--white); display: flex; align-items: center; justify-content: center; font-family: 'Oswald', sans-serif; font-size: 16px; font-weight: 700; color: var(--white); flex-shrink: 0; text-decoration: none; }
.site-title { font-family: 'Oswald', sans-serif; font-size: clamp(14px, 2.5vw, 22px); font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--white); text-align: center; flex: 1; line-height: 1.1; }
.site-title span { display: block; font-family: 'Share Tech Mono', monospace; font-size: 0.5em; letter-spacing: 0.2em; color: var(--gray5); font-weight: 400; margin-top: 3px; }
.back-link { font-family: 'Oswald', sans-serif; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gray4); text-decoration: none; transition: color 0.15s; flex-shrink: 0; }
.back-link:hover { color: var(--white); }

.section-wrap { max-width: 1400px; margin: 0 auto; padding: 56px 32px 72px; }
.section-label { font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 0.3em; color: var(--coral); text-transform: uppercase; margin-bottom: 12px; }
.archive-controls { display: flex; gap: 18px; flex-wrap: wrap; align-items: center; margin-bottom: 28px; }
.archive-controls label { font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 0.12em; color: var(--gray5); text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
.archive-controls select { background: var(--gray1); color: var(--white); border: 1px solid var(--gray3); font-family: 'Share Tech Mono', monospace; font-size: 12px; padding: 7px 10px; cursor: pointer; }
.archive-controls input { width: 14px; height: 14px; accent-color: var(--gold); cursor: pointer; }
.section-title { font-family: 'Oswald', sans-serif; font-size: clamp(32px, 5vw, 56px); font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: var(--white); margin-bottom: 8px; line-height: 1; }
.archive-meta { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--gray4); margin-bottom: 40px; }

.piece-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1px; background: var(--gray2); }
.piece-card { background: var(--black); cursor: pointer; transition: background 0.15s; overflow: hidden; }
.piece-card:hover { background: var(--gray1); }
.piece-img { width: 100%; aspect-ratio: 1; object-fit: contain; background: var(--gray1); display: block; }
.piece-img-placeholder { width: 100%; aspect-ratio: 1; background: var(--gray1); display: flex; align-items: center; justify-content: center; color: var(--gray3); font-size: 10px; }
.piece-info { padding: 8px 10px 10px; }
.piece-id { font-family: 'Oswald', sans-serif; font-size: 12px; font-weight: 600; color: var(--white); letter-spacing: 0.04em; }
.piece-date { font-size: 9px; color: var(--gray4); margin-top: 2px; letter-spacing: 0.05em; }

.load-more-wrap { text-align: center; margin-top: 48px; }
.btn { font-family: 'Oswald', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; padding: 11px 28px; border: 1px solid var(--gray3); color: var(--gray5); background: transparent; cursor: pointer; text-decoration: none; transition: all 0.15s; display: inline-block; }
.btn:hover { border-color: var(--white); color: var(--white); }
.btn-primary { border-color: var(--gold); color: var(--gold); }
.btn-primary:hover { background: var(--gold); color: var(--black); }

.loading-msg { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--gray4); letter-spacing: 0.15em; padding: 48px 0; text-align: center; }

.modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 200; overflow-y: auto; padding: 40px 24px; }
.modal-backdrop.open { display: flex; align-items: flex-start; justify-content: center; }
.modal { background: var(--black); border: 1px solid var(--gray3); max-width: 640px; width: 100%; padding: 0; position: relative; margin-top: 20px; }
.modal-close { position: absolute; top: 12px; right: 12px; width: 38px; height: 38px; background: rgba(0,0,0,0.7); border: 1px solid var(--gray3); border-radius: 50%; color: var(--white); font-size: 16px; cursor: pointer; line-height: 1; font-family: monospace; z-index: 3; transition: all 0.15s; }
.modal-close:hover { background: var(--coral); color: #000; border-color: var(--coral); }
.modal-img { width: 100%; max-height: 72vh; object-fit: contain; background: var(--gray1); display: block; }
.modal-body { padding: 24px 28px 28px; }
.modal-id { font-family: 'Oswald', sans-serif; font-size: 22px; font-weight: 700; color: var(--white); letter-spacing: 0.04em; margin-bottom: 4px; }
.modal-date { font-size: 10px; color: var(--gray4); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 12px; }
.modal-desc-label { font-size: 9px; letter-spacing: 0.25em; color: var(--gray4); text-transform: uppercase; margin-bottom: 8px; }
.modal-desc { font-size: 12px; color: var(--gray5); line-height: 1.85; margin-bottom: 24px; white-space: pre-wrap; }
.modal-links { display: flex; gap: 12px; flex-wrap: wrap; }

@media (max-width: 640px) {
  .section-wrap { padding: 40px 16px 56px; }
  .header-inner { padding: 14px 20px; }
  .piece-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
}
.modal-correct { margin-top: 20px; border-top: 1px solid var(--gray3); padding-top: 16px; }
.correct-toggle { background: none; border: none; color: var(--gray5); font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; padding: 0; text-decoration: underline; }
.correct-toggle:hover { color: var(--coral); }
.correct-form { margin-top: 14px; }
.correct-form textarea { width: 100%; min-height: 70px; background: var(--gray1); border: 1px solid var(--gray3); color: var(--white); font-family: 'Share Tech Mono', monospace; font-size: 12px; padding: 10px; outline: none; resize: vertical; }
.correct-form input { width: 100%; background: var(--gray1); border: 1px solid var(--gray3); color: var(--white); font-family: 'Share Tech Mono', monospace; font-size: 12px; padding: 8px 10px; margin-top: 8px; outline: none; }
.correct-form .btn-primary { margin-top: 10px; font-size: 11px; padding: 9px 18px; }
.correct-msg { font-size: 11px; color: var(--coral); margin-top: 10px; letter-spacing: 0.05em; }
.search-box { border: 1px solid var(--gray3); background: var(--gray1); padding: 24px; margin-bottom: 40px; }
.search-modes { display: flex; gap: 8px; margin-bottom: 18px; }
.mode-btn { font-family: 'Oswald', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; padding: 8px 18px; border: 1px solid var(--gray3); background: transparent; color: var(--gray5); cursor: pointer; transition: all 0.15s; }
.mode-btn.active { border-color: var(--gold); color: var(--gold); }
.search-panel { display: none; }
.search-panel.active { display: block; }
.search-row { display: flex; gap: 10px; flex-wrap: wrap; }
.search-input { flex: 1; min-width: 200px; background: var(--black); border: 1px solid var(--gray3); color: var(--white); font-family: 'Share Tech Mono', monospace; font-size: 13px; padding: 11px 14px; outline: none; }
.search-input:focus { border-color: var(--gold); }
.upload-zone { border: 1px dashed var(--gray3); padding: 28px; text-align: center; cursor: pointer; transition: border-color 0.15s; }
.upload-zone:hover { border-color: var(--white); }
.upload-zone-title { font-family: 'Oswald', sans-serif; font-size: 14px; letter-spacing: 0.08em; color: var(--gray5); text-transform: uppercase; }
.upload-zone p { font-size: 10px; color: var(--gray4); margin-top: 6px; }
.preview-wrap img { max-width: 180px; border: 1px solid var(--gray3); display: block; margin-bottom: 12px; }
.search-results-label { font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 0.2em; color: var(--coral); text-transform: uppercase; margin: 24px 0 14px; }
.search-grid { margin-top: 8px; }
</style>
</head>
<body>

<header id="site-header">
  <div class="header-inner">
    <a href="/" class="back-link">← Back</a>
    <div class="site-title">
      Geographies of Trash
      <span>Full Archive</span>
    </div>
    <div style="width:60px"></div>
  </div>
</header>

<div class="section-wrap">
  <div class="section-label">Archive</div>
  <div class="section-title" id="archiveTitle">All Pieces</div>
  <div class="archive-meta" id="archiveMeta">Loading...</div>

  <div class="search-box">
    <div class="section-label" style="margin-bottom:14px;">Search the archive</div>
    <div class="search-modes">
      <button class="mode-btn active" id="modeSemantic" onclick="setSearchMode('semantic')">Keywords</button>
      <button class="mode-btn" id="modeImage" onclick="setSearchMode('image')">Image</button>
    </div>
    <div class="search-panel active" id="panelSemantic">
      <div class="search-row">
        <input class="search-input" id="semanticInput" placeholder="Describe a piece — e.g. 'rusty shopping cart with painted eyes'" onkeydown="if(event.key==='Enter')searchSemantic()">
        <button class="btn btn-primary" onclick="searchSemantic()">Search</button>
      </div>
    </div>
    <div class="search-panel" id="panelImage">
      <div class="upload-zone" id="uploadZone" onclick="document.getElementById('imgUpload').click()" ondrop="handleDrop(event)" ondragover="event.preventDefault()">
        <div class="upload-zone-title">Drop a photo or click to upload</div>
        <p>AI identifies your photo and finds matching pieces</p>
      </div>
      <input type="file" id="imgUpload" accept="image/*" style="display:none" onchange="handleImageUpload(this)">
      <div class="preview-wrap" id="uploadPreview" style="display:none;">
        <div style="position:relative;display:inline-block;">
          <img id="previewImg" src="" alt="">
          <button onclick="clearUpload()" title="Remove photo" aria-label="Remove photo" style="position:absolute;top:6px;right:6px;width:26px;height:26px;border-radius:50%;border:none;background:rgba(0,0,0,0.72);color:#fff;font-size:13px;line-height:1;cursor:pointer;">✕</button>
        </div>
        <div>
          <button class="btn btn-primary" onclick="searchByImage()">Find Similar Pieces</button>
          <button class="btn" onclick="clearUpload()" style="margin-left:8px;">Clear</button>
        </div>
      </div>
    </div>
    <div id="resultControls" style="display:none;gap:16px;flex-wrap:wrap;align-items:center;margin:20px 0 2px;">
      <label style="font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:0.12em;color:var(--gray5);text-transform:uppercase;display:flex;align-items:center;gap:8px;">Year
        <select id="yearFilter" onchange="renderResults()" style="background:var(--gray1);color:var(--white);border:1px solid var(--gray3);font-family:'Share Tech Mono',monospace;font-size:12px;padding:7px 10px;cursor:pointer;">
          <option value="">All years</option>
          <option value="2026">2026</option>
          <option value="2025">2025</option>
          <option value="2024">2024</option>
          <option value="2023">2023</option>
          <option value="2022">2022</option>
          <option value="2021">2021</option>
          <option value="2020">2020</option>
        </select>
      </label>
      <label style="font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:0.12em;color:var(--gray5);text-transform:uppercase;display:flex;align-items:center;gap:8px;">Sort
        <select id="resultSort" onchange="renderResults()" style="background:var(--gray1);color:var(--white);border:1px solid var(--gray3);font-family:'Share Tech Mono',monospace;font-size:12px;padding:7px 10px;cursor:pointer;">
          <option value="match">Best match</option>
          <option value="newest">Newest</option>
          <option value="oldest">Oldest</option>
        </select>
      </label>
    </div>
    <div id="searchResults"></div>
  </div>

  <div class="archive-controls">
    <label>Sort
      <select id="sortSel" onchange="applyControls()">
        <option value="newest">Newest first</option>
        <option value="oldest">Oldest first</option>
        <option value="nft">NFTs first</option>
      </select>
    </label>
    <label><input type="checkbox" id="nftOnly" onchange="applyControls()"> NFTs only</label>
  </div>
  <div class="piece-grid" id="pieceGrid">
    <div class="loading-msg" id="archiveLoader" style="grid-column:1/-1">Loading archive...</div>
  </div>
  <div class="load-more-wrap">
    <button class="btn btn-primary" id="loadMoreBtn" onclick="loadMore()" style="display:none">Load More</button>
  </div>
</div>

<div class="modal-backdrop" id="pieceModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <img class="modal-img" id="modalImg" src="" alt="">
    <div class="modal-body">
      <div class="modal-id" id="modalId"></div>
      <div class="modal-date" id="modalDate"></div>
      <div class="modal-desc-label">AI Description</div>
      <div class="modal-desc" id="modalDesc"></div>
      <div class="modal-links" id="modalLinks"></div>
      <div style="margin-top:14px;">
        <button class="btn" onclick="copyPieceLink()" style="font-size:11px;padding:9px 18px;">Copy link to this piece</button>
        <span id="copyMsg" style="font-size:11px;color:var(--coral);margin-left:10px;letter-spacing:0.05em;"></span>
      </div>
      <div class="modal-correct">
        <button class="correct-toggle" onclick="toggleCorrect()">Suggest a correction</button>
        <div class="correct-form" id="correctForm" style="display:none;">
          <textarea id="correctText" placeholder="What should this piece's description say?"></textarea>
          <input id="correctFrom" placeholder="Your name or @handle (optional)">
          <button class="btn btn-primary" onclick="sendCorrection()">Submit</button>
          <div class="correct-msg" id="correctMsg"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<footer style="border-top:1px solid var(--gray3);text-align:center;padding:28px 20px;font-size:11px;color:var(--gray4);letter-spacing:0.08em;">
  Produced &amp; managed by <a href="https://www.instagram.com/youngwildpanda" target="_blank" rel="noopener" style="color:var(--gold);text-decoration:none;">@youngwildpanda</a>
</footer>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzfyuPvQOoGQfRMFmD0pbd7MoW8Tte3pnr2iMqxmFNvNl4UBZMpgnvIcyM-w7b50rYd/exec';
const PAGE_SIZE = 48;
let allPieces = [], view = [], displayedCount = 0;
let currentPieceId = '';
const gotNum = p => parseInt(String(p.pieceID || p.piece_id || '').replace('GOT_', '')) || 0;
const hasNft = p => !!(p.nftURL || p.nft_url || p.NFT_URL);

function getDriveImgSrc(imageUrl, size) {
  if (!imageUrl) return null;
  if (imageUrl.includes('drive.google.com')) {
    const idMatch = imageUrl.match(/[?&]id=([^&]+)/);
    if (idMatch) {
      return 'https://drive.google.com/thumbnail?id=' + idMatch[1] + '&sz=' + (size || 'w400');
    }
  }
  return '/api/proxy?url=' + encodeURIComponent(imageUrl);
}

function formatDate(raw) {
  if (!raw) return '';
  const d = new Date(raw);
  if (isNaN(d)) return raw;
  return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric', timeZone: 'UTC' });
}

function stripMarkdown(text) {
  if (!text) return '';
  return text
    .replace(/\*\*(.*?)\*\*/g, '$1')
    .replace(/\*(.*?)\*/g, '$1')
    .replace(/\| /g, '\n\n')
    .replace(/\|/g, '')
    .trim();
}

window.addEventListener('load', loadArchive);

async function loadArchive() {
  try {
    const res = await fetch(APPS_SCRIPT_URL + '?action=getAllConfirmed');
    const data = await res.json();
    allPieces = data.items || data.rows || data.data || (Array.isArray(data) ? data : []);
    document.getElementById('archiveLoader').remove();
    var headline = allPieces.reduce(function(m, p){ var n = parseInt(String(p.pieceID || p.piece_id || '').replace(/\D/g, ''), 10) || 0; return n > m ? n : m; }, 0) || allPieces.length;
    document.getElementById('archiveTitle').textContent = headline.toLocaleString() + ' Pieces';
    applyControls();
    var params = new URLSearchParams(location.search);
    var qp = params.get('q');
    if (qp) {
      setSearchMode('semantic');
      document.getElementById('semanticInput').value = qp;
      searchSemantic();
      var sb = document.querySelector('.search-box'); if (sb) sb.scrollIntoView({ behavior: 'smooth' });
    } else if (params.get('mode') === 'image') {
      setSearchMode('image');
      var sbi = document.querySelector('.search-box'); if (sbi) sbi.scrollIntoView({ behavior: 'smooth' });
    }
    var pieceParam = params.get('piece');
    if (pieceParam) {
      var pp = allPieces.find(function (x) { return (x.pieceID || '') === pieceParam; });
      if (pp) openModal(pp);
    }
  } catch(e) {
    document.getElementById('archiveLoader').textContent = 'Failed to load archive.';
  }
}

function renderPage() {
  const grid = document.getElementById('pieceGrid');
  view.slice(displayedCount, displayedCount + PAGE_SIZE).forEach(piece => {
    grid.appendChild(makeCard(piece));
  });
  displayedCount += Math.min(PAGE_SIZE, view.length - displayedCount);
  document.getElementById('loadMoreBtn').style.display = displayedCount < view.length ? 'inline-block' : 'none';
}

function loadMore() { renderPage(); }

function applyControls() {
  const sort = (document.getElementById('sortSel') || {}).value || 'newest';
  const onlyNft = (document.getElementById('nftOnly') || {}).checked;
  view = allPieces.filter(p => !onlyNft || hasNft(p));
  if (sort === 'oldest') view.sort((a, b) => gotNum(a) - gotNum(b));
  else if (sort === 'nft') view.sort((a, b) => (hasNft(b) - hasNft(a)) || (gotNum(b) - gotNum(a)));
  else view.sort((a, b) => gotNum(b) - gotNum(a));
  document.getElementById('pieceGrid').innerHTML = '';
  displayedCount = 0;
  document.getElementById('archiveMeta').textContent =
    (onlyNft ? view.length.toLocaleString() + ' NFT pieces' : view.length.toLocaleString() + ' shown') + ' · click any piece for details';
  renderPage();
}

function makeCard(piece) {
  const id = piece.pieceID || piece.Piece_ID || '';
  const date = formatDate(piece.postDate || piece.post_date || '');
  const thumb = getDriveImgSrc(piece.imageURL || piece.image_url || '', 'w400');
  const card = document.createElement('div');
  card.className = 'piece-card';
  card.onclick = function() { openModal(piece); };
  card.innerHTML = thumb
    ? '<img class="piece-img" src="' + thumb + '" alt="' + id + '" loading="lazy" onerror="this.style.display=\'none\'">' +
      '<div class="piece-info"><div class="piece-id">' + id + '</div><div class="piece-date">' + date + '</div></div>'
    : '<div class="piece-img-placeholder">—</div>' +
      '<div class="piece-info"><div class="piece-id">' + id + '</div><div class="piece-date">' + date + '</div></div>';
  return card;
}

function openModal(piece) {
  const id = piece.pieceID || '';
  currentPieceId = id;
  const date = formatDate(piece.postDate || piece.post_date || '');
  const notes = stripMarkdown(piece.notes || piece.notes2 || piece.caption || '');
  const imgSrc = getDriveImgSrc(piece.imageURL || piece.image_url || '', 'w800');
  const postUrl = piece.postURL || piece.post_url || '';
  const stravaRaw = piece.stravaURL || piece.strava_url || piece.Strava_Ride_URL || '';
  const stravaUrl = stravaRaw.split('|')[0].trim();
  const nftUrl = piece.nftURL || piece.nft_url || piece.NFT_URL || '';

  document.getElementById('modalImg').src = imgSrc || '';
  document.getElementById('modalImg').style.display = imgSrc ? 'block' : 'none';
  document.getElementById('modalId').textContent = id;
  document.getElementById('modalDate').textContent = date;
  document.getElementById('modalDesc').textContent = notes || 'No description available.';

  const links = document.getElementById('modalLinks');
  links.innerHTML = '';
  if (postUrl) links.innerHTML += '<a href="' + postUrl + '" target="_blank" class="btn btn-primary" style="font-size:11px;padding:9px 18px;">Instagram →</a>';
  if (stravaUrl) links.innerHTML += '<a href="' + stravaUrl + '" target="_blank" class="btn" style="font-size:11px;padding:9px 18px;">Strava →</a>';
  if (nftUrl) links.innerHTML += '<a href="' + nftUrl + '" target="_blank" class="btn" style="font-size:11px;padding:9px 18px;">View NFT →</a>';

  const cf = document.getElementById('correctForm'); if (cf) cf.style.display = 'none';
  const cm = document.getElementById('correctMsg'); if (cm) cm.textContent = '';
  const ct = document.getElementById('correctText'); if (ct) ct.value = '';
  document.getElementById('pieceModal').classList.add('open');
  document.body.style.overflow = 'hidden';
  if (history.replaceState) history.replaceState(null, '', location.pathname + '?piece=' + encodeURIComponent(id));
}
function copyPieceLink() {
  var url = location.origin + location.pathname + '?piece=' + encodeURIComponent(currentPieceId);
  var msg = document.getElementById('copyMsg');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(url).then(
      function () { if (msg) { msg.textContent = 'Link copied!'; setTimeout(function () { msg.textContent = ''; }, 2000); } },
      function () { if (msg) msg.textContent = url; }
    );
  } else if (msg) { msg.textContent = url; }
}

function toggleCorrect() {
  const f = document.getElementById('correctForm');
  f.style.display = (f.style.display === 'none' || !f.style.display) ? 'block' : 'none';
}
async function sendCorrection() {
  const text = document.getElementById('correctText').value.trim();
  const msg = document.getElementById('correctMsg');
  if (!text) { msg.textContent = 'Please enter your suggestion.'; return; }
  const from = document.getElementById('correctFrom').value.trim();
  msg.textContent = 'Submitting...';
  try {
    await fetch(APPS_SCRIPT_URL + '?action=submitCorrection&pieceID=' + encodeURIComponent(currentPieceId) + '&text=' + encodeURIComponent(text) + '&from=' + encodeURIComponent(from));
    msg.textContent = 'Thanks — submitted for review.';
    document.getElementById('correctText').value = '';
    document.getElementById('correctFrom').value = '';
  } catch (e) { msg.textContent = 'Could not submit right now. Try again later.'; }
}

// ---- Search (keywords + image) ----
let uploadedImageFile = null;
function setSearchMode(mode) {
  ['Semantic','Image'].forEach(function(m) {
    document.getElementById('panel'+m).classList.toggle('active', m.toLowerCase()===mode);
    document.getElementById('mode'+m).classList.toggle('active', m.toLowerCase()===mode);
  });
  document.getElementById('searchResults').innerHTML = '';
}
async function searchSemantic() {
  var q = document.getElementById('semanticInput').value.trim();
  if (!q) return;
  var results = document.getElementById('searchResults');
  results.innerHTML = '<div class="loading-msg">Searching...</div>';
  try {
    var vec = await getEmbedding(q);
    var matches = await queryPinecone(vec, 250);
    lastMatches = matches; lastDescription = '';
    renderResults();
  } catch(e) { results.innerHTML = '<div class="search-results-label">Search failed: ' + e.message + '</div>'; }
}
function handleDrop(e) { e.preventDefault(); var f = e.dataTransfer.files[0]; if (f && f.type.indexOf('image/')===0) setUploadPreview(f); }
function handleImageUpload(input) { if (input.files[0]) setUploadPreview(input.files[0]); }
function setUploadPreview(file) {
  uploadedImageFile = file;
  var r = new FileReader();
  r.onload = function(e) {
    document.getElementById('previewImg').src = e.target.result;
    document.getElementById('uploadPreview').style.display = 'block';
    document.getElementById('uploadZone').style.display = 'none';
  };
  r.readAsDataURL(file);
}
function clearUpload() {
  uploadedImageFile = null;
  var inp = document.getElementById('imgUpload'); if (inp) inp.value = '';
  document.getElementById('previewImg').src = '';
  document.getElementById('uploadPreview').style.display = 'none';
  document.getElementById('uploadZone').style.display = '';
  document.getElementById('searchResults').innerHTML = '';
}
async function searchByImage() {
  if (!uploadedImageFile) return;
  var results = document.getElementById('searchResults');
  results.innerHTML = '<div class="loading-msg">Analyzing image...</div>';
  try {
    var base64 = await resizeToBase64(uploadedImageFile, 512);
    var description = await getVisionDescription(base64, 'image/jpeg');
    var vec = await getEmbedding(description);
    var matches = await queryPinecone(vec, 250);
    lastMatches = matches; lastDescription = description;
    renderResults();
  } catch(e) { results.innerHTML = '<div class="search-results-label">Search failed: ' + e.message + '</div>'; }
}
function fileToBase64(file) {
  return new Promise(function(res, rej) {
    var r = new FileReader();
    r.onload = function() { res(r.result.split(',')[1]); };
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}
// Shrink to a 512x512 JPEG (matches the index) so the upload stays small (avoids 413)
function resizeToBase64(file, dim) {
  dim = dim || 512;
  return new Promise(function(res, rej) {
    var img = new Image();
    var url = URL.createObjectURL(file);
    img.onload = function() {
      var c = document.createElement('canvas');
      c.width = dim; c.height = dim;
      c.getContext('2d').drawImage(img, 0, 0, dim, dim);
      URL.revokeObjectURL(url);
      res(c.toDataURL('image/jpeg', 0.85).split(',')[1]);
    };
    img.onerror = function(e) { URL.revokeObjectURL(url); rej(e); };
    img.src = url;
  });
}
async function getVisionDescription(base64, mimeType) {
  var res = await fetch('/api/describe', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ base64: base64, mimeType: mimeType }) });
  if (!res.ok) { var e = await res.json(); throw new Error(e.error || res.status); }
  return (await res.json()).description;
}
async function getImageEmbedding(base64) {
  var res = await fetch('/api/embed-image', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ base64: base64 }) });
  if (!res.ok) { var e = await res.json().catch(function(){return {};}); throw new Error(e.error || ('embed-image ' + res.status)); }
  return (await res.json()).embedding;
}
async function queryPineconeImage(vector, topK) {
  var res = await fetch('/api/search-image', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ vector: vector, topK: topK || 40 }) });
  if (!res.ok) throw new Error('Image search failed');
  return (await res.json()).matches || [];
}
async function getEmbedding(text) {
  var res = await fetch('/api/embed', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ text: text }) });
  if (!res.ok) { var e = await res.json(); throw new Error(e.error || res.status); }
  return (await res.json()).embedding;
}
async function queryPinecone(vector, topK) {
  var res = await fetch('/api/search', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ vector: vector, topK: topK || 40 }) });
  if (!res.ok) throw new Error('Search failed');
  return (await res.json()).matches || [];
}
var lastMatches = [], lastDescription = '';
function _pieceYear(m) { var d = new Date(((m.metadata || {}).post_date) || 0); return isNaN(d) ? '' : String(d.getFullYear()); }
function _pieceTime(m) { var d = new Date(((m.metadata || {}).post_date) || 0); return isNaN(d) ? 0 : d.getTime(); }
function renderResults() {
  var results = document.getElementById('searchResults');
  var ctrls = document.getElementById('resultControls');
  if (!lastMatches.length && !lastDescription) { if (ctrls) ctrls.style.display = 'none'; return; }
  if (ctrls) ctrls.style.display = 'flex';
  var ms = lastMatches.slice();
  var yr = (document.getElementById('yearFilter') || {}).value || '';
  if (yr) ms = ms.filter(function (m) { return _pieceYear(m) === yr; });
  var sort = (document.getElementById('resultSort') || {}).value || 'match';
  if (sort === 'newest') ms.sort(function (a, b) { return _pieceTime(b) - _pieceTime(a); });
  else if (sort === 'oldest') ms.sort(function (a, b) { return _pieceTime(a) - _pieceTime(b); });
  results.innerHTML = lastDescription
    ? '<div class="search-results-label">AI Analysis</div><div style="font-size:11px;color:var(--gray5);margin-bottom:8px;line-height:1.8;max-width:560px;">' + lastDescription + '</div>'
    : '';
  renderSearchResults(ms, results, !!lastDescription);
}
function renderSearchResults(matches, container, append) {
  matches = matches.slice(0, 250);
  var label = document.createElement('div');
  label.className = 'search-results-label';
  label.textContent = matches.length + ' pieces found';
  if (!append) container.innerHTML = '';
  container.appendChild(label);
  var grid = document.createElement('div');
  grid.className = 'piece-grid search-grid';
  matches.forEach(function(match) {
    var meta = match.metadata || {};
    grid.appendChild(makeCard({
      pieceID: meta.piece_id || match.id,
      postDate: meta.post_date || '',
      notes: meta.description || '',
      imageURL: meta.image_url || '',
      postURL: meta.post_url || '',
      stravaURL: meta.strava_url || '',
      nftURL: meta.nft_url || ''
    }));
  });
  container.appendChild(grid);
}
function closeModal() {
  document.getElementById('pieceModal').classList.remove('open');
  document.body.style.overflow = '';
  if (history.replaceState) history.replaceState(null, '', location.pathname);
  var cm = document.getElementById('copyMsg'); if (cm) cm.textContent = '';
}

document.getElementById('pieceModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
